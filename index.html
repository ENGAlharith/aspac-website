<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASPAC Construction — Building Iraq's Future with Turkish Quality</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #C8A45D;
  --gold-light: #D9BC84;
  --gold-dark: #A8823D;
  --black: #0A0A0A;
  --dark: #111111;
  --dark2: #1A1A1A;
  --dark3: #242424;
  --white: #FAFAF8;
  --white2: #F0EDE8;
  --muted: #888880;
  --border: rgba(200,164,93,0.15);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
  line-height: 1.6;
}
.font-display { font-family: 'Cormorant Garamond', serif; }
.font-heading { font-family: 'Space Grotesk', sans-serif; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

/* Animations */
@keyframes fadeInUp { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeInLeft { from { opacity:0; transform:translateX(-40px); } to { opacity:1; transform:translateX(0); } }
@keyframes fadeInRight { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
@keyframes float1 { 0%,100% { transform:translateY(0px); } 50% { transform:translateY(-12px); } }
@keyframes float2 { 0%,100% { transform:translateY(0px); } 50% { transform:translateY(-18px); } }
@keyframes float3 { 0%,100% { transform:translateY(0px); } 50% { transform:translateY(-8px); } }
@keyframes shimmer { 0% { background-position:-200% center; } 100% { background-position:200% center; } }
@keyframes pulse-gold { 0%,100% { box-shadow:0 0 0 0 rgba(200,164,93,0.3); } 50% { box-shadow:0 0 0 20px rgba(200,164,93,0); } }
@keyframes counterUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes lineGrow { from { width:0; } to { width:100%; } }
@keyframes rotateBg { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
@keyframes gradientShift { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }

.animate-float1 { animation: float1 4s ease-in-out infinite; }
.animate-float2 { animation: float2 5s ease-in-out infinite; }
.animate-float3 { animation: float3 6s ease-in-out infinite; }

/* Reveal animations */
.reveal { opacity: 0; transform: translateY(50px); transition: opacity 0.8s ease, transform 0.8s ease; }
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-left { opacity: 0; transform: translateX(-50px); transition: opacity 0.8s ease, transform 0.8s ease; }
.reveal-left.visible { opacity: 1; transform: translateX(0); }
.reveal-right { opacity: 0; transform: translateX(50px); transition: opacity 0.8s ease, transform 0.8s ease; }
.reveal-right.visible { opacity: 1; transform: translateX(0); }

/* Gold text gradient */
.gold-text {
  background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 50%, var(--gold-light) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.gold-shimmer {
  background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold), var(--gold-dark));
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 3s linear infinite;
}

/* Gold line */
.gold-line {
  display: block;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto;
}

/* Glass card */
.glass {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(200,164,93,0.12);
}
.glass-dark {
  background: rgba(10,10,10,0.6);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(200,164,93,0.1);
}

/* Gold button */
.btn-gold {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: var(--black);
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 14px 32px;
  border: none;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  text-decoration: none;
}
.btn-gold::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  opacity: 0;
  transition: opacity 0.3s ease;
}
.btn-gold:hover::after { opacity: 1; }
.btn-gold span { position: relative; z-index: 1; }

.btn-outline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 500;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 13px 32px;
  border: 1px solid rgba(200,164,93,0.5);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.3s ease;
  text-decoration: none;
}
.btn-outline:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(200,164,93,0.05);
}

/* Section label */
.section-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::before {
  content: '';
  display: block;
  width: 32px;
  height: 1px;
  background: var(--gold);
}

/* ===================== NAVBAR ===================== */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 0 48px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all 0.4s ease;
}
.navbar.scrolled {
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(200,164,93,0.1);
  height: 68px;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}
.nav-logo-mark {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 1.2rem;
  color: var(--black);
  letter-spacing: -0.02em;
  flex-shrink: 0;
}
.nav-logo-text { display: flex; flex-direction: column; }
.nav-logo-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.08em;
  line-height: 1;
}
.nav-logo-sub {
  font-size: 0.6rem;
  color: var(--gold);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  line-height: 1;
  margin-top: 3px;
}
.nav-menu {
  display: flex;
  align-items: center;
  gap: 36px;
  list-style: none;
}
.nav-menu a {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(250,250,248,0.7);
  text-decoration: none;
  position: relative;
  transition: color 0.3s;
}
.nav-menu a::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0;
  width: 0; height: 1px;
  background: var(--gold);
  transition: width 0.3s ease;
}
.nav-menu a:hover { color: var(--white); }
.nav-menu a:hover::after { width: 100%; }

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}
.hamburger span {
  display: block;
  width: 24px;
  height: 1.5px;
  background: var(--white);
  transition: all 0.3s;
}

/* Mobile nav */
.mobile-nav {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10,10,10,0.98);
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
}
.mobile-nav.open { display: flex; }
.mobile-nav a {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.5rem;
  font-weight: 300;
  color: var(--white);
  text-decoration: none;
  letter-spacing: 0.05em;
  transition: color 0.3s;
}
.mobile-nav a:hover { color: var(--gold); }
.mobile-close {
  position: absolute;
  top: 28px; right: 24px;
  background: none;
  border: none;
  color: var(--white);
  font-size: 1.8rem;
  cursor: pointer;
}

/* ===================== HERO ===================== */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(10,10,10,0.95) 0%, rgba(26,26,26,0.7) 60%, rgba(10,10,10,0.85) 100%),
    url('https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1800&q=80&auto=format&fit=crop') center/cover no-repeat;
  transform-origin: center;
}
.hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(10,10,10,0.9) 40%, transparent 100%);
}
.hero-bg::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 200px;
  background: linear-gradient(to top, var(--black), transparent);
}
.hero-inner {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
  padding-top: 100px;
  padding-bottom: 80px;
}
.hero-content { flex: 1; max-width: 680px; }
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(200,164,93,0.1);
  border: 1px solid rgba(200,164,93,0.25);
  border-radius: 100px;
  padding: 8px 18px 8px 12px;
  margin-bottom: 36px;
  animation: fadeInUp 0.8s ease both;
}
.hero-badge-dot {
  width: 8px; height: 8px;
  background: var(--gold);
  border-radius: 50%;
  animation: pulse-gold 2s infinite;
}
.hero-badge span {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
}
.hero-headline {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3.2rem, 7vw, 6rem);
  font-weight: 300;
  line-height: 1.05;
  color: var(--white);
  margin-bottom: 8px;
  animation: fadeInUp 0.9s 0.1s ease both;
}
.hero-headline strong {
  font-weight: 700;
  display: block;
}
.hero-headline em {
  font-style: italic;
  color: var(--gold-light);
}
.hero-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 28px 0;
  animation: fadeInUp 1s 0.2s ease both;
}
.hero-divider-line {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, var(--gold), transparent);
}
.hero-services {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
}
.hero-subtext {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 44px;
  animation: fadeInUp 1s 0.25s ease both;
}
.hero-tag {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(250,250,248,0.5);
  padding: 6px 14px;
  border: 1px solid rgba(250,250,248,0.08);
  border-radius: 1px;
  transition: all 0.3s;
}
.hero-tag:hover {
  border-color: rgba(200,164,93,0.3);
  color: var(--gold-light);
}
.hero-ctas {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  animation: fadeInUp 1s 0.35s ease both;
}
.hero-scroll {
  position: absolute;
  bottom: 36px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  z-index: 2;
  animation: fadeInUp 1.2s 0.6s ease both;
  cursor: pointer;
}
.hero-scroll span {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(250,250,248,0.4);
}
.scroll-line {
  width: 1px; height: 50px;
  background: linear-gradient(to bottom, rgba(200,164,93,0.6), transparent);
  animation: float1 2s ease-in-out infinite;
}

/* Hero stats */
.hero-stats {
  display: flex;
  flex-direction: column;
  gap: 16px;
  animation: fadeInRight 1s 0.4s ease both;
}
.hero-stat-card {
  background: rgba(10,10,10,0.7);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(200,164,93,0.15);
  border-radius: 8px;
  padding: 20px 28px;
  min-width: 200px;
  position: relative;
  overflow: hidden;
  transition: all 0.4s ease;
}
.hero-stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: linear-gradient(to bottom, var(--gold), transparent);
}
.hero-stat-card:hover {
  border-color: rgba(200,164,93,0.35);
  transform: translateX(-6px);
  background: rgba(20,20,20,0.85);
}
.stat-card-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem;
  font-weight: 600;
  line-height: 1;
  color: var(--gold);
  margin-bottom: 4px;
}
.stat-card-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(250,250,248,0.55);
  font-weight: 500;
}

/* ===================== SERVICES ===================== */
.section {
  padding: 120px 48px;
  max-width: 1400px;
  margin: 0 auto;
}
.section-full { padding: 120px 0; }
.section-header { text-align: center; margin-bottom: 72px; }
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 400;
  color: var(--white);
  line-height: 1.1;
  margin-top: 16px;
}
.section-desc {
  color: var(--muted);
  font-size: 0.95rem;
  max-width: 540px;
  margin: 16px auto 0;
  line-height: 1.8;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: rgba(200,164,93,0.08);
  border: 1px solid rgba(200,164,93,0.08);
  border-radius: 12px;
  overflow: hidden;
}
.service-card {
  background: var(--dark);
  padding: 44px 36px;
  position: relative;
  cursor: pointer;
  transition: all 0.4s ease;
  overflow: hidden;
}
.service-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(200,164,93,0.05), transparent);
  opacity: 0;
  transition: opacity 0.4s;
}
.service-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 0; height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent);
  transition: width 0.5s ease;
}
.service-card:hover::before { opacity: 1; }
.service-card:hover::after { width: 100%; }
.service-card:hover { background: var(--dark2); }
.service-icon {
  width: 56px; height: 56px;
  background: rgba(200,164,93,0.08);
  border: 1px solid rgba(200,164,93,0.15);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
  transition: all 0.4s;
}
.service-card:hover .service-icon {
  background: rgba(200,164,93,0.15);
  border-color: rgba(200,164,93,0.35);
  transform: scale(1.05);
}
.service-icon svg { color: var(--gold); }
.service-num {
  position: absolute;
  top: 20px; right: 24px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 4rem;
  font-weight: 700;
  color: rgba(200,164,93,0.05);
  line-height: 1;
  transition: color 0.4s;
}
.service-card:hover .service-num { color: rgba(200,164,93,0.1); }
.service-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 12px;
  transition: color 0.3s;
}
.service-card:hover .service-title { color: var(--gold-light); }
.service-desc {
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.75;
}
.service-arrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 20px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.4s;
}
.service-card:hover .service-arrow { opacity: 1; transform: translateY(0); }

/* ===================== WHY ASPAC ===================== */
.why-section {
  background: var(--dark);
  padding: 120px 0;
}
.why-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 48px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}
.why-image-wrap {
  position: relative;
}
.why-image {
  width: 100%;
  aspect-ratio: 4/5;
  object-fit: cover;
  border-radius: 4px;
}
.why-image-frame {
  position: absolute;
  bottom: -24px; right: -24px;
  width: 60%;
  aspect-ratio: 4/3;
  background:
    url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=600&q=80&auto=format&fit=crop') center/cover;
  border-radius: 4px;
  border: 4px solid var(--dark);
}
.why-badge {
  position: absolute;
  top: 24px; left: -20px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border-radius: 8px;
  padding: 16px 20px;
  text-align: center;
}
.why-badge-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--black);
  line-height: 1;
}
.why-badge-txt {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(10,10,10,0.7);
  margin-top: 2px;
}
.why-content { }
.why-list { margin-top: 36px; display: flex; flex-direction: column; gap: 18px; }
.why-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 18px 20px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(200,164,93,0.06);
  border-radius: 6px;
  transition: all 0.3s;
}
.why-item:hover {
  background: rgba(200,164,93,0.04);
  border-color: rgba(200,164,93,0.15);
  transform: translateX(6px);
}
.why-check {
  width: 28px; height: 28px;
  background: rgba(200,164,93,0.12);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.why-item-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 3px;
}
.why-item-desc {
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.6;
}

/* ===================== PROJECTS ===================== */
.projects-section { background: var(--black); }
.projects-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: auto auto;
  gap: 2px;
  background: rgba(200,164,93,0.06);
}
.project-card {
  position: relative;
  overflow: hidden;
  cursor: pointer;
  aspect-ratio: 4/3;

.project-card.tall { aspect-ratio: 3/4; grid-row: span 2; }
.project-img {

.project-overlay {

  text-transform: uppercase;

  margin-bottom: 6px;
}
.project-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--white);

}
.project-loc {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.75rem;
  color: rgba(250,250,248,0.5);
}

  margin-top: 72px;
}
.process-timeline::before {
  content: '';
  position: absolute;
  top: 36px; left: 10%;
  right: 10%;

  background: linear-gradient(90deg, transparent, rgba(200,164,93,0.3), rgba(200,164,93,0.6), rgba(200,164,93,0.3), transparent);

}

}
.process-dot-ring {
  position: absolute;
  inset: 0;
  border: 1px solid rgba(200,164,93,0.25);
  border-radius: 50%;
}
.process-dot {
  position: absolute;
  inset: 8px;

  align-items: center;
  justify-content: center;

  font-size: 1.1rem;

}
.process-step:hover .process-dot {
  background: rgba(200,164,93,0.12);
  border-color: var(--gold);
  color: var(--gold-light);
}
.process-step:hover .process-dot-ring {
  border-color: rgba(200,164,93,0.5);
}
.process-step-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 8px;
  letter-spacing: 0.02em;
}
.process-step-desc {
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.7;
}
.process-step-icon {
  margin-bottom: 12px;
  color: var(--gold);
  opacity: 0.6;
}

/* ===================== STATS ===================== */

  padding: 100px 48px;
  position: relative;
  overflow: hidden;
}

  content: '';
  position: absolute;
  top: 50%; left: 50%;

  background: radial-gradient(circle, rgba(200,164,93,0.04) 0%, transparent 70%);

}
.stats-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
  background: rgba(200,164,93,0.06);

  overflow: hidden;
}

  overflow: hidden;

}
.stat-item::before {
  content: '';
  position: absolute;

  transition: opacity 0.4s;

.stat-item:hover { background: var(--dark2); }

.stat-num {
  font-family: 'Cormorant Garamond', serif;

  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));

  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

/* ===================== CERTIFICATES ===================== */
.certs-section {
  background: var(--dark);
  padding: 120px 48px;
}

  overflow: hidden;
  transition: all 0.4s ease;
  cursor: default;
}
.cert-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.4s;
}
.cert-card:hover {
  background: rgba(200,164,93,0.04);
  border-color: rgba(200,164,93,0.25);

.cert-card:hover::before { opacity: 1; }
.cert-icon {
  width: 60px; height: 60px;

.cert-issuer {

}
.cert-desc {
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.7;
}

  top: -50%; right: -20%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(200,164,93,0.04), transparent 70%);
  pointer-events: none;

  position: relative;

  text-align: center;
}
.cta-banner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.cta-banner::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,164,93,0.3), transparent);
}
.cta-glow {
  position: absolute;
  top: -80px; left: 50%;
  transform: translateX(-50%);

  background: radial-gradient(circle, rgba(200,164,93,0.08), transparent 70%);

.cta-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; position: relative; }

// ── useReveal hook ─────────────────────────────────────────────
function useReveal() {
  useEffect(() => {
    const targets = document.querySelectorAll('.reveal, .reveal-left, .reveal-right');
    const observer = new IntersectionObserver(
      (entries) => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.12, rootMargin: '0px 0px -50px 0px' }
    );
    targets.forEach(t => observer.observe(t));
    return () => observer.disconnect();
  }, []);
}

// ── Counter hook ───────────────────────────────────────────────
function useCounter(target, suffix = '', duration = 2000) {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        const start = Date.now();
        const tick = () => {
          const elapsed = Date.now() - start;
          const progress = Math.min(elapsed / duration, 1);
          const ease = 1 - Math.pow(1 - progress, 3);
          setCount(Math.round(target * ease));
          if (progress < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        observer.disconnect();
      }
    }, { threshold: 0.5 });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [target, duration]);
  return { count, ref };
}
