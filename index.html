<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASPAC Group — Building Iraq's Future with Turkish Quality</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ─── LOGO COLORS: Teal #2A9D8F, Dark Teal #1A6666, Mid #1E8080, Accent #3BB5A6 ─── */
:root {
  --teal:       #2A9D8F;
  --teal-dark:  #1A6666;
  --teal-deep:  #0F4A4A;
  --teal-light: #3BB5A6;
  --teal-pale:  #E8F7F6;
  --teal-mist:  #F0FAFA;
  --white:      #FFFFFF;
  --off-white:  #F5FAFA;
  --bg:         #F7FDFC;
  --bg2:        #EEF8F7;
  --surface:    #FFFFFF;
  --text:       #0D2B2B;
  --text2:      #1A4A4A;
  --muted:      #5A8080;
  --border:     rgba(42,157,143,0.15);
  --border2:    rgba(42,157,143,0.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
  line-height:1.6;
}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--teal-mist);}
::-webkit-scrollbar-thumb{background:var(--teal);border-radius:2px;}

/* ── Animations ── */
@keyframes float1{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
@keyframes float2{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}
@keyframes float3{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
@keyframes pulse-teal{0%,100%{box-shadow:0 0 0 0 rgba(42,157,143,0.35);}50%{box-shadow:0 0 0 18px rgba(42,157,143,0);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(36px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeInRight{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
@keyframes lineGrow{from{width:0;}to{width:100%;}}

.animate-float1{animation:float1 4s ease-in-out infinite;}
.animate-float2{animation:float2 5s ease-in-out infinite;}
.animate-float3{animation:float3 6s ease-in-out infinite;}

/* ── Reveal ── */
.reveal{opacity:0;transform:translateY(48px);transition:opacity 0.8s ease,transform 0.8s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-left{opacity:0;transform:translateX(-48px);transition:opacity 0.8s ease,transform 0.8s ease;}
.reveal-left.visible{opacity:1;transform:translateX(0);}
.reveal-right{opacity:0;transform:translateX(48px);transition:opacity 0.8s ease,transform 0.8s ease;}
.reveal-right.visible{opacity:1;transform:translateX(0);}

/* ── Teal text gradient ── */
.teal-text{
  background:linear-gradient(135deg,var(--teal-dark) 0%,var(--teal) 50%,var(--teal-light) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.teal-shimmer{
  background:linear-gradient(90deg,var(--teal-dark),var(--teal-light),var(--teal),var(--teal-dark));
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 3s linear infinite;
}

/* ── Section label ── */
.section-label{
  font-family:'Space Grotesk',sans-serif;
  font-size:0.7rem;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;
  color:var(--teal);display:flex;align-items:center;gap:12px;
}
.section-label::before{content:'';display:block;width:32px;height:1px;background:var(--teal);}

/* ── Buttons ── */
.btn-teal{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--teal-dark),var(--teal));
  color:#fff;
  font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.85rem;
  letter-spacing:0.08em;text-transform:uppercase;
  padding:14px 32px;border:none;cursor:pointer;border-radius:3px;
  transition:all 0.3s ease;position:relative;overflow:hidden;text-decoration:none;
}
.btn-teal::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--teal),var(--teal-light));opacity:0;transition:opacity 0.3s;}
.btn-teal:hover::after{opacity:1;}
.btn-teal span{position:relative;z-index:1;}
.btn-teal svg{position:relative;z-index:1;}

.btn-outline{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;color:var(--teal-dark);
  font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:0.85rem;
  letter-spacing:0.08em;text-transform:uppercase;
  padding:13px 32px;border:1.5px solid var(--teal);
  cursor:pointer;border-radius:3px;transition:all 0.3s;text-decoration:none;
}
.btn-outline:hover{background:var(--teal);color:#fff;}

/* ══════════════ NAVBAR ══════════════ */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:0 48px;height:80px;
  display:flex;align-items:center;justify-content:space-between;
  transition:all 0.4s ease;
}
.navbar.scrolled{
  background:rgba(255,255,255,0.94);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border2);
  box-shadow:0 2px 24px rgba(42,157,143,0.08);
  height:68px;
}
.nav-logo{display:flex;align-items:center;gap:0;text-decoration:none;}
.nav-logo img{height:52px;width:auto;object-fit:contain;display:block;}
.navbar.scrolled .nav-logo img{height:44px;}

.nav-menu{display:flex;align-items:center;gap:36px;list-style:none;}
.nav-menu a{
  font-family:'Space Grotesk',sans-serif;font-size:0.8rem;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text2);text-decoration:none;position:relative;transition:color 0.3s;
}
.navbar:not(.scrolled) .nav-menu a{color:rgba(255,255,255,0.85);}
.navbar:not(.scrolled) .nav-menu a:hover{color:#fff;}
.nav-menu a::after{
  content:'';position:absolute;bottom:-3px;left:0;
  width:0;height:1.5px;background:var(--teal);transition:width 0.3s ease;
}
.nav-menu a:hover{color:var(--teal-dark);}
.nav-menu a:hover::after{width:100%;}

.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{display:block;width:24px;height:1.5px;background:var(--text);transition:all 0.3s;}
.navbar:not(.scrolled) .hamburger span{background:#fff;}

.mobile-nav{
  display:none;position:fixed;inset:0;
  background:rgba(255,255,255,0.98);backdrop-filter:blur(20px);
  z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:36px;
}
.mobile-nav.open{display:flex;}
.mobile-nav a{
  font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:400;
  color:var(--teal-dark);text-decoration:none;letter-spacing:0.04em;transition:color 0.3s;
}
.mobile-nav a:hover{color:var(--teal);}
.mobile-logo{margin-bottom:8px;}
.mobile-logo img{height:64px;width:auto;}
.mobile-close{position:absolute;top:28px;right:24px;background:none;border:none;color:var(--teal-dark);font-size:1.8rem;cursor:pointer;}

/* ══════════════ HERO ══════════════ */
.hero{
  position:relative;min-height:100vh;
  display:flex;align-items:center;overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    linear-gradient(135deg,rgba(15,74,74,0.93) 0%,rgba(26,102,102,0.78) 55%,rgba(42,157,143,0.65) 100%),
    url('https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1800&q=80&auto=format&fit=crop') center/cover no-repeat;
}
.hero-bg::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to right,rgba(15,74,74,0.88) 40%,transparent 100%);
}
.hero-bg::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:180px;
  background:linear-gradient(to top,var(--bg),transparent);
}
.hero-inner{
  position:relative;z-index:2;width:100%;max-width:1400px;
  margin:0 auto;padding:100px 48px 80px;
  display:flex;align-items:center;justify-content:space-between;gap:48px;
}
.hero-content{flex:1;max-width:660px;}

.hero-badge{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
  border-radius:100px;padding:8px 18px 8px 12px;margin-bottom:32px;
  animation:fadeInUp 0.8s ease both;backdrop-filter:blur(8px);
}
.hero-badge-dot{width:8px;height:8px;background:var(--teal-light);border-radius:50%;animation:pulse-teal 2s infinite;}
.hero-badge span{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.9);font-weight:500;}

.hero-headline{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,7vw,5.8rem);font-weight:300;line-height:1.05;
  color:#fff;margin-bottom:8px;animation:fadeInUp 0.9s 0.1s ease both;
}
.hero-headline em{font-style:italic;color:var(--teal-light);}

.hero-divider{display:flex;align-items:center;gap:16px;margin:26px 0;animation:fadeInUp 1s 0.2s ease both;}
.hero-divider-line{width:52px;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.5),transparent);}
.hero-services{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--teal-light);font-weight:500;}

.hero-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:40px;animation:fadeInUp 1s 0.25s ease both;}
.hero-tag{
  font-family:'Space Grotesk',sans-serif;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(255,255,255,0.6);padding:5px 12px;
  border:1px solid rgba(255,255,255,0.12);border-radius:2px;transition:all 0.3s;
}
.hero-tag:hover{border-color:rgba(59,181,166,0.5);color:var(--teal-light);}

.hero-ctas{display:flex;gap:14px;flex-wrap:wrap;animation:fadeInUp 1s 0.35s ease both;}

.hero-scroll{
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;z-index:2;
  animation:fadeInUp 1.2s 0.6s ease both;cursor:pointer;
}
.hero-scroll span{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.4);}
.scroll-line{width:1px;height:48px;background:linear-gradient(to bottom,rgba(59,181,166,0.7),transparent);animation:float1 2s ease-in-out infinite;}

/* Hero stats */
.hero-stats{display:flex;flex-direction:column;gap:14px;animation:fadeInRight 1s 0.4s ease both;}
.hero-stat-card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;padding:20px 28px;min-width:200px;
  position:relative;overflow:hidden;transition:all 0.4s ease;
}
.hero-stat-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(to bottom,var(--teal-light),transparent);}
.hero-stat-card:hover{border-color:rgba(59,181,166,0.35);transform:translateX(-6px);background:rgba(255,255,255,0.13);}
.stat-card-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:600;line-height:1;color:var(--teal-light);margin-bottom:4px;}
.stat-card-label{font-family:'Space Grotesk',sans-serif;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.55);font-weight:500;}

/* ══════════════ SECTIONS ══════════════ */
.section{padding:120px 48px;max-width:1400px;margin:0 auto;}
.section-header{text-align:center;margin-bottom:72px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.4rem,5vw,3.8rem);font-weight:400;color:var(--text);line-height:1.1;margin-top:14px;}
.section-desc{color:var(--muted);font-size:0.92rem;max-width:520px;margin:14px auto 0;line-height:1.8;}

/* ══════════════ SERVICES ══════════════ */
.services-section{background:var(--bg);}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(42,157,143,0.08);border:1px solid rgba(42,157,143,0.1);border-radius:14px;overflow:hidden;}
.service-card{
  background:var(--surface);padding:44px 32px;position:relative;
  cursor:pointer;transition:all 0.4s ease;overflow:hidden;
}
.service-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(42,157,143,0.04),transparent);opacity:0;transition:opacity 0.4s;}
.service-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:linear-gradient(90deg,var(--teal),transparent);transition:width 0.5s ease;}
.service-card:hover::before{opacity:1;}
.service-card:hover::after{width:100%;}
.service-card:hover{background:var(--teal-mist);}
.service-icon{width:52px;height:52px;background:rgba(42,157,143,0.08);border:1px solid rgba(42,157,143,0.18);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;transition:all 0.4s;}
.service-card:hover .service-icon{background:rgba(42,157,143,0.15);border-color:rgba(42,157,143,0.4);transform:scale(1.05);}
.service-icon svg{color:var(--teal);}
.service-num{position:absolute;top:18px;right:22px;font-family:'Cormorant Garamond',serif;font-size:3.8rem;font-weight:700;color:rgba(42,157,143,0.05);line-height:1;transition:color 0.4s;}
.service-card:hover .service-num{color:rgba(42,157,143,0.09);}
.service-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;color:var(--text);margin-bottom:10px;transition:color 0.3s;}
.service-card:hover .service-title{color:var(--teal-dark);}
.service-desc{font-size:0.83rem;color:var(--muted);line-height:1.75;}
.service-arrow{display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-family:'Space Grotesk',sans-serif;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--teal);opacity:0;transform:translateY(8px);transition:all 0.4s;}
.service-card:hover .service-arrow{opacity:1;transform:translateY(0);}

/* ══════════════ WHY ASPAC ══════════════ */
.why-section{background:var(--bg2);padding:120px 0;}
.why-inner{max-width:1400px;margin:0 auto;padding:0 48px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
.why-image-wrap{position:relative;}
.why-image{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:6px;box-shadow:0 32px 80px rgba(42,157,143,0.12);}
.why-image-frame{position:absolute;bottom:-24px;right:-24px;width:58%;aspect-ratio:4/3;background:url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=600&q=80&auto=format&fit=crop') center/cover;border-radius:6px;border:4px solid var(--bg2);box-shadow:0 16px 40px rgba(42,157,143,0.1);}
.why-badge{position:absolute;top:24px;left:-20px;background:linear-gradient(135deg,var(--teal-dark),var(--teal));border-radius:10px;padding:16px 20px;text-align:center;box-shadow:0 8px 32px rgba(42,157,143,0.3);}
.why-badge-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:#fff;line-height:1;}
.why-badge-txt{font-family:'Space Grotesk',sans-serif;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.75);margin-top:2px;}
.why-list{margin-top:32px;display:flex;flex-direction:column;gap:14px;}
.why-item{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;background:var(--surface);border:1px solid rgba(42,157,143,0.08);border-radius:8px;transition:all 0.3s;box-shadow:0 2px 8px rgba(42,157,143,0.03);}
.why-item:hover{background:var(--teal-mist);border-color:rgba(42,157,143,0.2);transform:translateX(6px);box-shadow:0 4px 20px rgba(42,157,143,0.08);}
.why-check{width:26px;height:26px;background:rgba(42,157,143,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.why-item-title{font-family:'Space Grotesk',sans-serif;font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:2px;}
.why-item-desc{font-size:0.78rem;color:var(--muted);line-height:1.6;}

/* ══════════════ PROJECTS ══════════════ */
.projects-bg{background:var(--bg);}
.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:rgba(42,157,143,0.06);}
.project-card{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:4/3;}
.project-card.tall{aspect-ratio:3/4;grid-row:span 2;}
.project-img{width:100%;height:100%;object-fit:cover;transition:transform 0.7s ease;}
.project-card:hover .project-img{transform:scale(1.08);}
.project-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(15,74,74,0.88) 0%,rgba(15,74,74,0.15) 60%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:28px;opacity:0.7;transform:translateY(8px);transition:all 0.4s ease;}
.project-card:hover .project-overlay{opacity:1;transform:translateY(0);}
.project-cat{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--teal-light);margin-bottom:5px;}
.project-name{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:500;color:#fff;margin-bottom:5px;}
.project-loc{display:flex;align-items:center;gap:5px;font-size:0.73rem;color:rgba(255,255,255,0.5);}

/* ══════════════ PROCESS ══════════════ */
.process-section{background:var(--bg2);padding:120px 48px;}
.process-inner{max-width:1400px;margin:0 auto;}
.process-timeline{display:grid;grid-template-columns:repeat(5,1fr);gap:0;position:relative;margin-top:72px;}
.process-timeline::before{content:'';position:absolute;top:36px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(42,157,143,0.25),rgba(42,157,143,0.5),rgba(42,157,143,0.25),transparent);}
.process-step{display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 14px;position:relative;}
.process-dot-wrap{width:72px;height:72px;position:relative;margin-bottom:22px;flex-shrink:0;}
.process-dot-ring{position:absolute;inset:0;border:1px solid rgba(42,157,143,0.2);border-radius:50%;}
.process-dot{position:absolute;inset:8px;background:var(--surface);border:1.5px solid rgba(42,157,143,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--teal);transition:all 0.4s;box-shadow:0 4px 16px rgba(42,157,143,0.06);}
.process-step:hover .process-dot{background:var(--teal);border-color:var(--teal);color:#fff;}
.process-step:hover .process-dot-ring{border-color:rgba(42,157,143,0.45);}
.process-step-icon{margin-bottom:10px;color:var(--teal);opacity:0.55;}
.process-step-title{font-family:'Space Grotesk',sans-serif;font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:8px;}
.process-step-desc{font-size:0.78rem;color:var(--muted);line-height:1.7;}

/* ══════════════ STATS ══════════════ */
.stats-section{background:var(--bg);padding:100px 48px;position:relative;overflow:hidden;}
.stats-section::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(42,157,143,0.05) 0%,transparent 70%);pointer-events:none;}
.stats-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:rgba(42,157,143,0.08);border:1px solid rgba(42,157,143,0.1);border-radius:12px;overflow:hidden;}
.stat-item{background:var(--surface);padding:56px 40px;text-align:center;position:relative;overflow:hidden;transition:background 0.4s;}
.stat-item::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:0;transition:opacity 0.4s;}
.stat-item:hover{background:var(--teal-mist);}
.stat-item:hover::before{opacity:1;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,5vw,4.8rem);font-weight:600;line-height:1;margin-bottom:10px;background:linear-gradient(135deg,var(--teal-dark),var(--teal-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-label{font-family:'Space Grotesk',sans-serif;font-size:0.73rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);font-weight:500;}

/* ══════════════ CERTS ══════════════ */
.certs-section{background:var(--bg2);padding:120px 48px;}
.certs-inner{max-width:1400px;margin:0 auto;}
.certs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:72px;}
.cert-card{background:var(--surface);border:1px solid rgba(42,157,143,0.1);border-radius:14px;padding:38px 30px;position:relative;overflow:hidden;transition:all 0.4s ease;cursor:default;box-shadow:0 2px 12px rgba(42,157,143,0.04);}
.cert-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:0;transition:opacity 0.4s;}
.cert-card:hover{border-color:rgba(42,157,143,0.25);transform:translateY(-6px);box-shadow:0 24px 60px rgba(42,157,143,0.1);}
.cert-card:hover::before{opacity:1;}
.cert-icon{width:56px;height:56px;background:rgba(42,157,143,0.07);border:1px solid rgba(42,157,143,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;color:var(--teal);}
.cert-title{font-family:'Space Grotesk',sans-serif;font-size:0.98rem;font-weight:600;color:var(--text);margin-bottom:6px;}
.cert-issuer{font-size:0.78rem;color:var(--teal);margin-bottom:10px;font-family:'Space Grotesk',sans-serif;font-weight:500;}
.cert-desc{font-size:0.8rem;color:var(--muted);line-height:1.7;}
.cert-shine{position:absolute;top:-50%;right:-20%;width:180px;height:180px;background:radial-gradient(circle,rgba(42,157,143,0.04),transparent 70%);pointer-events:none;}

/* ══════════════ CTA ══════════════ */
.cta-section{padding:0 48px 120px;max-width:1400px;margin:0 auto;}
.cta-banner{
  background:linear-gradient(135deg,var(--teal-deep) 0%,var(--teal-dark) 50%,var(--teal) 100%);
  border-radius:18px;padding:80px 64px;position:relative;overflow:hidden;text-align:center;
  box-shadow:0 32px 80px rgba(42,157,143,0.2);
}
.cta-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);}
.cta-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,0.06),transparent 70%);pointer-events:none;}
.cta-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.4rem,5vw,4.2rem);font-weight:300;color:#fff;line-height:1.1;margin-bottom:22px;position:relative;}
.cta-sub{color:rgba(255,255,255,0.7);font-size:0.92rem;margin-bottom:44px;max-width:460px;margin-left:auto;margin-right:auto;line-height:1.8;position:relative;}
.cta-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;position:relative;}
.btn-white{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--teal-dark);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;padding:14px 32px;border:none;cursor:pointer;border-radius:3px;transition:all 0.3s;text-decoration:none;}
.btn-white:hover{background:var(--teal-pale);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,0.1);}
.btn-white-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;padding:13px 32px;border:1.5px solid rgba(255,255,255,0.4);cursor:pointer;border-radius:3px;transition:all 0.3s;text-decoration:none;}
.btn-white-outline:hover{border-color:#fff;background:rgba(255,255,255,0.08);}

/* ══════════════ FOOTER ══════════════ */
.footer{background:var(--teal-deep);border-top:1px solid rgba(255,255,255,0.06);padding:80px 48px 40px;}
.footer-inner{max-width:1400px;margin:0 auto;}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1.5fr;gap:60px;margin-bottom:60px;}
.footer-logo{display:flex;align-items:center;gap:0;margin-bottom:18px;}
.footer-logo img{height:56px;width:auto;filter:brightness(0) invert(1);opacity:0.9;}
.footer-desc{color:rgba(255,255,255,0.5);font-size:0.84rem;line-height:1.8;max-width:290px;margin-bottom:26px;}
.footer-socials{display:flex;gap:10px;}
.social-btn{width:36px;height:36px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.45);cursor:pointer;transition:all 0.3s;}
.social-btn:hover{background:rgba(59,181,166,0.2);border-color:rgba(59,181,166,0.4);color:var(--teal-light);}
.footer-col-title{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--teal-light);font-weight:600;margin-bottom:22px;}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:11px;}
.footer-links a{color:rgba(255,255,255,0.45);text-decoration:none;font-size:0.83rem;transition:color 0.3s;display:flex;align-items:center;gap:8px;}
.footer-links a:hover{color:var(--teal-light);}
.footer-links a::before{content:'';width:10px;height:1px;background:rgba(59,181,166,0.3);flex-shrink:0;transition:all 0.3s;}
.footer-links a:hover::before{background:var(--teal-light);width:14px;}
.contact-item{display:flex;align-items:flex-start;gap:11px;margin-bottom:14px;color:rgba(255,255,255,0.45);font-size:0.83rem;}
.contact-icon{color:var(--teal-light);flex-shrink:0;margin-top:2px;}
.contact-item a{color:rgba(255,255,255,0.45);text-decoration:none;transition:color 0.3s;}
.contact-item a:hover{color:var(--teal-light);}
.map-btn{display:inline-flex;align-items:center;gap:8px;margin-top:14px;padding:9px 16px;background:rgba(59,181,166,0.1);border:1px solid rgba(59,181,166,0.25);border-radius:4px;color:var(--teal-light);font-size:0.73rem;letter-spacing:0.1em;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;font-weight:500;cursor:pointer;text-decoration:none;transition:all 0.3s;}
.map-btn:hover{background:rgba(59,181,166,0.2);border-color:rgba(59,181,166,0.5);}
.footer-bottom{border-top:1px solid rgba(255,255,255,0.06);padding-top:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;}
.footer-copy{font-size:0.76rem;color:rgba(255,255,255,0.3);}
.footer-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.88rem;color:rgba(59,181,166,0.45);}

/* ══════════════ RESPONSIVE ══════════════ */
@media(max-width:1100px){
  .services-grid{grid-template-columns:repeat(2,1fr);}
  .stats-inner{grid-template-columns:repeat(2,1fr);}
  .footer-grid{grid-template-columns:1fr 1fr;gap:40px;}
  .projects-grid{grid-template-columns:repeat(2,1fr);}
  .project-card.tall{grid-row:span 1;aspect-ratio:4/3;}
  .process-timeline{grid-template-columns:repeat(3,1fr);}
  .process-timeline::before{display:none;}
  .certs-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:768px){
  .navbar{padding:0 20px;}
  .nav-menu,.nav-quote{display:none;}
  .hamburger{display:flex;}
  .hero-inner{flex-direction:column;padding:100px 20px 80px;}
  .hero-stats{flex-direction:row;flex-wrap:wrap;justify-content:center;}
  .hero-stat-card{min-width:140px;flex:1;}
  .section{padding:80px 20px;}
  .process-section{padding:80px 20px;}
  .stats-section{padding:80px 20px;}
  .certs-section{padding:80px 20px;}
  .cta-section{padding:0 20px 80px;}
  .footer{padding:60px 20px 28px;}
  .services-grid{grid-template-columns:1fr;}
  .why-inner{grid-template-columns:1fr;padding:0 20px;}
  .why-image-frame{display:none;}
  .projects-grid{grid-template-columns:1fr;}
  .stats-inner{grid-template-columns:1fr 1fr;}
  .certs-grid{grid-template-columns:1fr;}
  .footer-grid{grid-template-columns:1fr;gap:32px;}
  .process-timeline{grid-template-columns:1fr 1fr;}
  .cta-banner{padding:48px 24px;}
  .footer-bottom{flex-direction:column;text-align:center;}
}
@media(max-width:480px){
  .stats-inner{grid-template-columns:1fr;}
  .process-timeline{grid-template-columns:1fr;}
  .hero-ctas{flex-direction:column;}
  .hero-stats{flex-direction:column;}
  .hero-stat-card{min-width:unset;}
}
</style>
</head>

/* ── Reveal hook ── */
function useReveal() {
  useEffect(() => {
    const targets = document.querySelectorAll('.reveal,.reveal-left,.reveal-right');
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
    );
    targets.forEach(t => obs.observe(t));
    return () => obs.disconnect();
  }, []);
}

/* ── Counter hook ── */
function useCounter(target, duration=2000) {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const obs = new IntersectionObserver(([entry]) => {
      if(entry.isIntersecting) {
        const start = Date.now();
        const tick = () => {
          const p = Math.min((Date.now()-start)/duration,1);
          const ease = 1-Math.pow(1-p,3);
          setCount(Math.round(target*ease));
          if(p<1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        obs.disconnect();
      }
    },{ threshold: 0.5 });
    if(ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  },[target,duration]);
  return { count, ref };
}
