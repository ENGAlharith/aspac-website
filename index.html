<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASPAC Group — Building Iraq's Future with Turkish Quality</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ══ LIGHT MODE (default) ══ */
:root,[data-theme="light"]{
  --teal:        #2A9D8F;
  --teal-dark:   #1A6666;
  --teal-deep:   #0F4A4A;
  --teal-light:  #3BB5A6;
  --teal-pale:   #E8F7F6;
  --teal-mist:   #F0FAFA;
  --bg:          #F7FDFC;
  --bg2:         #EEF8F7;
  --bg3:         #E4F4F3;
  --surface:     #FFFFFF;
  --surface2:    #F5FAFA;
  --text:        #0D2B2B;
  --text2:       #1A4A4A;
  --muted:       #5A8080;
  --border:      rgba(42,157,143,0.15);
  --border2:     rgba(42,157,143,0.28);
  --card-bg:     #FFFFFF;
  --card-hover:  #F0FAFA;
  --nav-scroll:  rgba(255,255,255,0.94);
  --nav-border:  rgba(42,157,143,0.18);
  --nav-link:    var(--text2);
  --shadow-sm:   0 2px 12px rgba(42,157,143,0.06);
  --shadow-md:   0 8px 32px rgba(42,157,143,0.10);
  --shadow-lg:   0 24px 60px rgba(42,157,143,0.13);
  --footer-bg:   #0F4A4A;
  --scrollbar-track: var(--teal-mist);
  --mobile-bg:   rgba(255,255,255,0.98);
  --mobile-link: var(--teal-dark);
}

/* ══ DARK MODE ══ */
[data-theme="dark"]{
  --teal:        #38D0BD;
  --teal-dark:   #2A9D8F;
  --teal-deep:   #0C3B3A;
  --teal-light:  #66E6D5;
  --teal-pale:   rgba(56,208,189,0.14);
  --teal-mist:   rgba(56,208,189,0.07);
  --bg:          #081312;
  --bg2:         #0C1B1A;
  --bg3:         #112321;
  --surface:     #102220;
  --surface2:    #18302D;
  --text:        #ECF8F6;
  --text2:       #AFD8D2;
  --muted:       #6FA8A1;
  --border:      rgba(56,208,189,0.16);
  --border2:     rgba(56,208,189,0.30);
  --card-bg:     #102220;
  --card-hover:  #173330;
  --nav-scroll:  rgba(8,19,18,0.85);
  --nav-border:  rgba(56,208,189,0.16);
  --nav-link:    var(--text2);
  --shadow-sm:   0 2px 14px rgba(0,0,0,0.45);
  --shadow-md:   0 10px 36px rgba(0,0,0,0.50);
  --shadow-lg:   0 28px 70px rgba(0,0,0,0.60);
  --footer-bg:   #050D0C;
  --scrollbar-track: #0C1B1A;
  --mobile-bg:   rgba(7,16,15,0.98);
  --mobile-link: var(--teal-light);
}
/* Ambient depth + subtle teal glow on the dark canvas */
[data-theme="dark"] body{
  background:
    radial-gradient(1100px 560px at 82% -8%, rgba(56,208,189,0.07), transparent 62%),
    radial-gradient(900px 520px at 8% 18%, rgba(42,157,143,0.05), transparent 60%),
    var(--bg);
  background-attachment:fixed;
}
[data-theme="dark"] .service-card,
[data-theme="dark"] .cert-card,
[data-theme="dark"] .stat-item{
  background:linear-gradient(162deg,var(--surface) 0%,var(--bg2) 100%);
}
[data-theme="dark"] .service-card:hover,
[data-theme="dark"] .stat-item:hover{background:linear-gradient(162deg,var(--card-hover) 0%,var(--surface) 100%);}
[data-theme="dark"] .cert-card:hover{
  box-shadow:var(--shadow-lg),0 0 0 1px rgba(56,208,189,0.07),0 0 44px rgba(56,208,189,0.06);
}
[data-theme="dark"] .service-card:hover{
  box-shadow:0 0 0 1px rgba(56,208,189,0.07),0 0 40px rgba(56,208,189,0.05);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;overflow-x:hidden;line-height:1.6;
  transition:background 0.4s ease,color 0.4s ease;
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--scrollbar-track);}
::-webkit-scrollbar-thumb{background:var(--teal);border-radius:2px;}

/* ── Animations ── */
@keyframes float1{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
@keyframes float2{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}
@keyframes float3{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
@keyframes pulse-teal{0%,100%{box-shadow:0 0 0 0 rgba(59,181,166,0.35);}50%{box-shadow:0 0 0 18px rgba(59,181,166,0);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(36px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeInRight{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.animate-float1{animation:float1 4s ease-in-out infinite;}
.animate-float2{animation:float2 5s ease-in-out infinite;}
.animate-float3{animation:float3 6s ease-in-out infinite;}

/* ── Reveal ── */
.reveal{opacity:0;transform:translateY(48px);transition:opacity 0.8s ease,transform 0.8s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-left{opacity:0;transform:translateX(-48px);transition:opacity 0.8s ease,transform 0.8s ease;}
.reveal-left.visible{opacity:1;transform:translateX(0);}
.reveal-right{opacity:0;transform:translateX(48px);transition:opacity 0.8s ease,transform 0.8s ease;}
.reveal-right.visible{opacity:1;transform:translateX(0);}

/* ── Text ── */
.teal-text{
  background:linear-gradient(135deg,var(--teal-dark) 0%,var(--teal) 50%,var(--teal-light) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.section-label{
  font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:600;
  letter-spacing:0.25em;text-transform:uppercase;color:var(--teal);
  display:flex;align-items:center;gap:12px;
}
.section-label::before{content:'';display:block;width:32px;height:1px;background:var(--teal);}

/* ── Buttons ── */
.btn-teal{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--teal-dark),var(--teal));
  color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.85rem;
  letter-spacing:0.08em;text-transform:uppercase;padding:14px 32px;
  border:none;cursor:pointer;border-radius:3px;transition:all 0.3s;
  position:relative;overflow:hidden;text-decoration:none;
}
.btn-teal::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--teal),var(--teal-light));opacity:0;transition:opacity 0.3s;}
.btn-teal:hover::after{opacity:1;}
.btn-teal>*{position:relative;z-index:1;}

.btn-outline{
  display:inline-flex;align-items:center;gap:8px;background:transparent;
  color:var(--text2);font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:0.85rem;
  letter-spacing:0.08em;text-transform:uppercase;padding:13px 32px;
  border:1.5px solid var(--teal);cursor:pointer;border-radius:3px;transition:all 0.3s;text-decoration:none;
}
.btn-outline:hover{background:var(--teal);color:#fff;}

.btn-white{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--teal-deep);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;padding:14px 32px;border:none;cursor:pointer;border-radius:3px;transition:all 0.3s;text-decoration:none;}
.btn-white:hover{background:var(--teal-pale);transform:translateY(-1px);}
.btn-white-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;padding:13px 32px;border:1.5px solid rgba(255,255,255,0.4);cursor:pointer;border-radius:3px;transition:all 0.3s;text-decoration:none;}
.btn-white-outline:hover{border-color:#fff;background:rgba(255,255,255,0.08);}

/* ══ THEME TOGGLE ══ */
.theme-toggle{
  width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border2);
  background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.3s ease;color:var(--teal);flex-shrink:0;
}
.theme-toggle:hover{background:var(--teal-pale);border-color:var(--teal);transform:scale(1.05);}
[data-theme="dark"] .theme-toggle{background:var(--surface2);border-color:var(--border2);}
[data-theme="dark"] .theme-toggle:hover{background:rgba(59,181,166,0.12);}

/* ══ NAVBAR ══ */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:0 48px;height:80px;display:flex;align-items:center;justify-content:space-between;
  transition:all 0.4s ease;
}
.navbar.scrolled{
  background:var(--nav-scroll);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--nav-border);box-shadow:var(--shadow-sm);height:68px;
}
.nav-logo{display:flex;align-items:center;text-decoration:none;color:var(--text);}
/* On dark hero (not scrolled) the wordmark is white */
.navbar:not(.scrolled) .nav-logo{color:#fff;}

/* ── Brand wordmark ── */
.brand{display:inline-flex;align-items:center;gap:11px;color:inherit;}
.brand-mark{height:42px;width:auto;flex-shrink:0;color:inherit;transition:height 0.3s ease;}
.navbar.scrolled .brand-mark{height:36px;}
.brand-text{display:flex;flex-direction:column;justify-content:center;line-height:1;}
.brand-name{
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.32rem;
  letter-spacing:0.16em;color:currentColor;
}
.brand-sub{
  font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:0.58rem;
  letter-spacing:0.46em;color:var(--teal);margin-top:4px;text-indent:0.46em;
}
.navbar:not(.scrolled) .brand-sub{color:var(--teal-light);}

.nav-menu{display:flex;align-items:center;gap:36px;list-style:none;}
.nav-menu a{
  font-family:'Space Grotesk',sans-serif;font-size:0.8rem;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--nav-link);
  text-decoration:none;position:relative;transition:color 0.3s;
}
.navbar:not(.scrolled) .nav-menu a{color:rgba(255,255,255,0.85);}
.navbar:not(.scrolled) .nav-menu a:hover{color:#fff;}
.nav-menu a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1.5px;background:var(--teal);transition:width 0.3s;}
.nav-menu a:hover{color:var(--teal);}
.nav-menu a:hover::after{width:100%;}

.nav-right{display:flex;align-items:center;gap:10px;}
.hamburger{display:none;align-items:center;justify-content:center;width:36px;height:36px;cursor:pointer;background:none;border:none;padding:4px;}

.mobile-nav{
  display:none;position:fixed;inset:0;
  background:var(--mobile-bg);backdrop-filter:blur(20px);
  z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:32px;
  transition:background 0.4s;
}
.mobile-nav.open{display:flex;}
.mobile-nav a{
  font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:400;
  color:var(--mobile-link);text-decoration:none;letter-spacing:0.04em;transition:color 0.3s;
}
.mobile-nav a:hover{color:var(--teal);}
.mobile-logo{margin-bottom:8px;color:var(--text);}
.mobile-logo .brand-mark{height:52px;}
.mobile-logo .brand-name{font-size:1.7rem;}
.mobile-logo .brand-sub{font-size:0.7rem;}
.mobile-close{position:absolute;top:24px;right:20px;background:none;border:none;color:var(--mobile-link);cursor:pointer;}

/* ══ HERO ══ */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;}
.hero-bg{
  position:absolute;inset:0;
  background:
    linear-gradient(135deg,rgba(8,20,20,0.88) 0%,rgba(15,74,74,0.68) 55%,rgba(26,102,102,0.48) 100%),
    url('images/hero.jpg') center/cover no-repeat;
}
.hero-bg::before{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(8,20,20,0.88) 40%,transparent 100%);}
.hero-bg::after{content:'';position:absolute;bottom:0;left:0;right:0;height:180px;background:linear-gradient(to top,var(--bg),transparent);}

.hero-inner{position:relative;z-index:2;width:100%;max-width:1400px;margin:0 auto;padding:100px 48px 80px;display:flex;align-items:center;justify-content:space-between;gap:48px;}
.hero-content{flex:1;max-width:660px;}
.hero-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:100px;padding:8px 18px 8px 12px;margin-bottom:32px;animation:fadeInUp 0.8s ease both;backdrop-filter:blur(8px);}
.hero-badge-dot{width:8px;height:8px;background:var(--teal-light);border-radius:50%;animation:pulse-teal 2s infinite;}
.hero-badge span{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.9);font-weight:500;}
.hero-headline{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,7vw,5.8rem);font-weight:300;line-height:1.05;color:#fff;margin-bottom:8px;animation:fadeInUp 0.9s 0.1s ease both;}
.hero-headline em{font-style:italic;color:var(--teal-light);}
.hero-divider{display:flex;align-items:center;gap:16px;margin:26px 0;animation:fadeInUp 1s 0.2s ease both;}
.hero-divider-line{width:52px;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.5),transparent);}
.hero-services{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--teal-light);font-weight:500;}
.hero-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:40px;animation:fadeInUp 1s 0.25s ease both;}
.hero-tag{font-family:'Space Grotesk',sans-serif;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);padding:5px 12px;border:1px solid rgba(255,255,255,0.12);border-radius:2px;transition:all 0.3s;}
.hero-tag:hover{border-color:rgba(59,181,166,0.5);color:var(--teal-light);}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap;animation:fadeInUp 1s 0.35s ease both;}
.hero-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:2;animation:fadeInUp 1.2s 0.6s ease both;cursor:pointer;}
.hero-scroll span{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.4);}
.scroll-line{width:1px;height:48px;background:linear-gradient(to bottom,rgba(59,181,166,0.7),transparent);animation:float1 2s ease-in-out infinite;}
.hero-stats{display:flex;flex-direction:column;gap:14px;animation:fadeInRight 1s 0.4s ease both;}
.hero-stat-card{background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:20px 28px;min-width:200px;position:relative;overflow:hidden;transition:all 0.4s ease;}
.hero-stat-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(to bottom,var(--teal-light),transparent);}
.hero-stat-card:hover{border-color:rgba(59,181,166,0.35);transform:translateX(-6px);background:rgba(255,255,255,0.11);}
.stat-card-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:600;line-height:1;color:var(--teal-light);margin-bottom:4px;}
.stat-card-label{font-family:'Space Grotesk',sans-serif;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.55);font-weight:500;}

/* ══ SECTIONS ══ */
.section{padding:120px 48px;max-width:1400px;margin:0 auto;}
.section-header{text-align:center;margin-bottom:72px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.4rem,5vw,3.8rem);font-weight:400;color:var(--text);line-height:1.1;margin-top:14px;}
.section-desc{color:var(--muted);font-size:0.92rem;max-width:520px;margin:14px auto 0;line-height:1.8;}

/* ══ SERVICES ══ */
.services-bg{background:var(--bg);}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.service-card{background:var(--card-bg);padding:44px 32px;position:relative;cursor:pointer;transition:all 0.4s ease;overflow:hidden;}
.service-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(42,157,143,0.05),transparent);opacity:0;transition:opacity 0.4s;}
.service-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:linear-gradient(90deg,var(--teal),transparent);transition:width 0.5s;}
.service-card:hover::before{opacity:1;}
.service-card:hover::after{width:100%;}
.service-card:hover{background:var(--card-hover);}
.service-icon{width:52px;height:52px;background:rgba(42,157,143,0.08);border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;transition:all 0.4s;}
.service-card:hover .service-icon{background:rgba(42,157,143,0.15);border-color:var(--teal);transform:scale(1.05);}
.service-num{position:absolute;top:18px;right:22px;font-family:'Cormorant Garamond',serif;font-size:3.8rem;font-weight:700;color:rgba(42,157,143,0.05);line-height:1;transition:color 0.4s;}
[data-theme="dark"] .service-num{color:rgba(59,181,166,0.06);}
.service-card:hover .service-num{color:rgba(42,157,143,0.1)!important;}
.service-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;color:var(--text);margin-bottom:10px;transition:color 0.3s;}
.service-card:hover .service-title{color:var(--teal);}
.service-desc{font-size:0.83rem;color:var(--muted);line-height:1.75;}
.service-arrow{display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-family:'Space Grotesk',sans-serif;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--teal);opacity:0;transform:translateY(8px);transition:all 0.4s;}
.service-card:hover .service-arrow{opacity:1;transform:translateY(0);}

/* ══ WHY ASPAC ══ */
.why-section{background:var(--bg2);padding:120px 0;}
.why-inner{max-width:1400px;margin:0 auto;padding:0 48px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
.why-image{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:6px;box-shadow:var(--shadow-lg);}
.why-image-wrap{position:relative;}
.why-image-frame{position:absolute;bottom:-24px;right:-24px;width:58%;aspect-ratio:4/3;background:url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=600&q=80&auto=format&fit=crop') center/cover;border-radius:6px;border:4px solid var(--bg2);box-shadow:var(--shadow-md);}
.why-badge{position:absolute;top:24px;left:-20px;background:linear-gradient(135deg,var(--teal-dark),var(--teal));border-radius:10px;padding:16px 20px;text-align:center;box-shadow:0 8px 32px rgba(42,157,143,0.3);}
.why-badge-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:#fff;line-height:1;}
.why-badge-txt{font-family:'Space Grotesk',sans-serif;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.8);margin-top:2px;}
.why-list{margin-top:32px;display:flex;flex-direction:column;gap:12px;}
.why-item{display:flex;align-items:flex-start;gap:14px;padding:15px 17px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;transition:all 0.3s;box-shadow:var(--shadow-sm);}
.why-item:hover{background:var(--card-hover);border-color:var(--border2);transform:translateX(6px);box-shadow:var(--shadow-md);}
.why-check{width:26px;height:26px;background:rgba(42,157,143,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
[data-theme="dark"] .why-check{background:rgba(59,181,166,0.12);}
.why-item-title{font-family:'Space Grotesk',sans-serif;font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:2px;}
.why-item-desc{font-size:0.78rem;color:var(--muted);line-height:1.6;}

/* ══ PROJECTS ══ */
.projects-bg{background:var(--bg);}
.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--border);}
.project-card{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:4/3;}
.project-card.tall{aspect-ratio:3/4;grid-row:span 2;}
.project-img{width:100%;height:100%;object-fit:cover;transition:transform 0.7s ease;}
.project-card:hover .project-img{transform:scale(1.08);}
.project-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,20,20,0.9) 0%,rgba(8,20,20,0.15) 60%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:28px;opacity:0.75;transform:translateY(8px);transition:all 0.4s;}
.project-card:hover .project-overlay{opacity:1;transform:translateY(0);}
.project-cat{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--teal-light);margin-bottom:5px;}
.project-name{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:500;color:#fff;margin-bottom:5px;}
.project-loc{display:flex;align-items:center;gap:5px;font-size:0.73rem;color:rgba(255,255,255,0.5);}
.project-meta{margin-top:10px;display:inline-flex;align-self:flex-start;font-family:'Space Grotesk',sans-serif;font-size:0.68rem;font-weight:500;letter-spacing:0.03em;color:var(--teal-light);background:rgba(59,181,166,0.14);border:1px solid rgba(59,181,166,0.28);padding:4px 11px;border-radius:999px;backdrop-filter:blur(4px);}

/* ══ FULL PORTFOLIO TABLE ══ */
.portfolio-section{background:var(--bg2);padding:120px 48px;}
.portfolio-inner{max-width:1200px;margin:0 auto;}
.pf-filters{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:40px 0 30px;}
.pf-chip{display:inline-flex;align-items:center;gap:8px;font-family:'Space Grotesk',sans-serif;font-size:0.78rem;font-weight:500;letter-spacing:0.03em;color:var(--text2);background:var(--surface);border:1px solid var(--border2);padding:9px 18px;border-radius:999px;cursor:pointer;transition:all 0.25s;}
.pf-chip:hover{border-color:var(--teal);color:var(--teal);}
.pf-chip.active{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border-color:transparent;box-shadow:var(--shadow-sm);}
.pf-chip-count{font-size:0.66rem;font-weight:600;background:var(--teal-pale);color:var(--teal);padding:1px 7px;border-radius:999px;}
.pf-chip.active .pf-chip-count{background:rgba(255,255,255,0.22);color:#fff;}
.pf-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:14px;background:var(--surface);box-shadow:var(--shadow-md);}
.pf-table{width:100%;border-collapse:collapse;min-width:780px;}
.pf-table thead th{text-align:left;font-family:'Space Grotesk',sans-serif;font-size:0.64rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);padding:18px 22px;border-bottom:1px solid var(--border2);background:var(--surface2);}
.pf-table tbody td{padding:15px 22px;border-bottom:1px solid var(--border);font-size:0.84rem;color:var(--text2);vertical-align:middle;}
.pf-table tbody tr{transition:background 0.2s;}
.pf-table tbody tr:hover{background:var(--card-hover);}
.pf-table tbody tr:last-child td{border-bottom:none;}
.pf-name{font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--text);}
.pf-loc,.pf-years{color:var(--muted);white-space:nowrap;}
.pf-years{font-size:0.8rem;}
.pf-val{font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--teal);white-space:nowrap;}
.pf-tag{display:inline-block;font-family:'Space Grotesk',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:4px 10px;border-radius:6px;white-space:nowrap;}
.pf-hospital{background:rgba(42,157,143,0.16);color:var(--teal);}
.pf-hotel{background:rgba(201,162,39,0.18);color:#bf962e;}
.pf-commercial{background:rgba(56,130,200,0.16);color:#4a8fd0;}
.pf-residential{background:rgba(139,92,200,0.16);color:#9568cf;}
.pf-education{background:rgba(205,95,125,0.16);color:#cf6285;}
.pf-infrastructure{background:rgba(130,130,140,0.18);color:var(--muted);}
.pf-status{display:flex;align-items:center;gap:10px;min-width:130px;}
.pf-bar{flex:1;height:5px;background:var(--border2);border-radius:999px;overflow:hidden;}
.pf-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal-dark),var(--teal));border-radius:999px;transition:width 0.5s;}
.pf-pct{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:600;color:var(--muted);min-width:38px;text-align:right;}
.pf-done{color:var(--teal);}
@media(max-width:768px){.portfolio-section{padding:80px 20px;}}

/* ══ PROCESS ══ */
.process-section{background:var(--bg2);padding:120px 48px;}
.process-inner{max-width:1400px;margin:0 auto;}
.process-timeline{display:grid;grid-template-columns:repeat(5,1fr);gap:0;position:relative;margin-top:72px;}
.process-timeline::before{content:'';position:absolute;top:36px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--border2),var(--teal),var(--border2),transparent);}
.process-step{display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 14px;position:relative;}
.process-dot-wrap{width:72px;height:72px;position:relative;margin-bottom:22px;flex-shrink:0;}
.process-dot-ring{position:absolute;inset:0;border:1px solid var(--border2);border-radius:50%;}
.process-dot{position:absolute;inset:8px;background:var(--card-bg);border:1.5px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--teal);transition:all 0.4s;box-shadow:var(--shadow-sm);}
.process-step:hover .process-dot{background:var(--teal);border-color:var(--teal);color:#fff;}
.process-step:hover .process-dot-ring{border-color:var(--teal);}
.process-step-icon{margin-bottom:10px;color:var(--teal);opacity:0.6;}
.process-step-title{font-family:'Space Grotesk',sans-serif;font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:8px;}
.process-step-desc{font-size:0.78rem;color:var(--muted);line-height:1.7;}

/* ══ STATS ══ */
.stats-section{background:var(--bg);padding:100px 48px;position:relative;overflow:hidden;}
.stats-section::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(42,157,143,0.05) 0%,transparent 70%);pointer-events:none;}
.stats-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.stat-item{background:var(--card-bg);padding:56px 40px;text-align:center;position:relative;overflow:hidden;transition:background 0.4s;}
.stat-item::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:0;transition:opacity 0.4s;}
.stat-item:hover{background:var(--card-hover);}
.stat-item:hover::before{opacity:1;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,5vw,4.8rem);font-weight:600;line-height:1;margin-bottom:10px;background:linear-gradient(135deg,var(--teal-dark),var(--teal-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-label{font-family:'Space Grotesk',sans-serif;font-size:0.73rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);font-weight:500;}

/* ══ CERTS ══ */
.certs-section{background:var(--bg2);padding:120px 48px;}
.certs-inner{max-width:1400px;margin:0 auto;}
.certs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:72px;}
.cert-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:36px 28px;position:relative;overflow:hidden;transition:all 0.4s;box-shadow:var(--shadow-sm);}
.cert-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:0;transition:opacity 0.4s;}
.cert-card:hover{border-color:var(--border2);transform:translateY(-6px);box-shadow:var(--shadow-lg);}
.cert-card:hover::before{opacity:1;}
.cert-icon{width:54px;height:54px;background:rgba(42,157,143,0.08);border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;color:var(--teal);}
[data-theme="dark"] .cert-icon{background:rgba(59,181,166,0.08);}
.cert-title{font-family:'Space Grotesk',sans-serif;font-size:0.96rem;font-weight:600;color:var(--text);margin-bottom:5px;}
.cert-issuer{font-size:0.77rem;color:var(--teal);margin-bottom:10px;font-family:'Space Grotesk',sans-serif;font-weight:500;}
.cert-desc{font-size:0.79rem;color:var(--muted);line-height:1.7;}

/* ══ CTA ══ */
.cta-section{padding:0 48px 120px;max-width:1400px;margin:0 auto;}
.cta-banner{background:linear-gradient(135deg,var(--teal-deep) 0%,var(--teal-dark) 50%,var(--teal) 100%);border-radius:18px;padding:80px 64px;position:relative;overflow:hidden;text-align:center;box-shadow:0 32px 80px rgba(42,157,143,0.2);}
.cta-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);}
.cta-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,0.06),transparent 70%);pointer-events:none;}
.cta-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.4rem,5vw,4.2rem);font-weight:300;color:#fff;line-height:1.1;margin-bottom:20px;position:relative;}
.cta-sub{color:rgba(255,255,255,0.7);font-size:0.92rem;margin-bottom:44px;max-width:460px;margin-left:auto;margin-right:auto;line-height:1.8;position:relative;}
.cta-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;position:relative;}

/* ══ FOOTER ══ */
.footer{background:var(--footer-bg);border-top:1px solid rgba(255,255,255,0.05);padding:80px 48px 40px;transition:background 0.4s;}
.footer-inner{max-width:1400px;margin:0 auto;}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1.5fr;gap:60px;margin-bottom:60px;}
.footer-logo{margin-bottom:18px;color:#fff;}
.footer-logo .brand-mark{height:46px;}
.footer-logo .brand-name{font-size:1.4rem;}
.footer-logo .brand-sub{color:var(--teal-light);}
.footer-desc{color:rgba(255,255,255,0.45);font-size:0.83rem;line-height:1.8;max-width:285px;margin-bottom:24px;}
.footer-socials{display:flex;gap:10px;}
.social-btn{width:36px;height:36px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:6px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.3s;text-decoration:none;}
.social-btn:hover{background:rgba(59,181,166,0.18);border-color:rgba(59,181,166,0.4);color:var(--teal-light);}
.footer-col-title{font-family:'Space Grotesk',sans-serif;font-size:0.71rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--teal-light);font-weight:600;margin-bottom:20px;}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:10px;}
.footer-links a{color:rgba(255,255,255,0.42);text-decoration:none;font-size:0.82rem;transition:color 0.3s;display:flex;align-items:center;gap:8px;}
.footer-links a:hover{color:var(--teal-light);}
.footer-links a::before{content:'';width:10px;height:1px;background:rgba(59,181,166,0.28);flex-shrink:0;transition:all 0.3s;}
.footer-links a:hover::before{background:var(--teal-light);width:14px;}
.contact-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:13px;color:rgba(255,255,255,0.42);font-size:0.82rem;}
.contact-icon{color:var(--teal-light);flex-shrink:0;margin-top:2px;}
.contact-item a{color:rgba(255,255,255,0.42);text-decoration:none;transition:color 0.3s;}
.contact-item a:hover{color:var(--teal-light);}
.map-btn{display:inline-flex;align-items:center;gap:7px;margin-top:12px;padding:9px 15px;background:rgba(59,181,166,0.1);border:1px solid rgba(59,181,166,0.22);border-radius:4px;color:var(--teal-light);font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;font-weight:500;cursor:pointer;text-decoration:none;transition:all 0.3s;}
.map-btn:hover{background:rgba(59,181,166,0.18);border-color:rgba(59,181,166,0.45);}
.footer-bottom{border-top:1px solid rgba(255,255,255,0.05);padding-top:26px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.footer-copy{font-size:0.75rem;color:rgba(255,255,255,0.28);}
.footer-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.87rem;color:rgba(59,181,166,0.42);}

/* ══ RESPONSIVE ══ */
@media(max-width:1100px){
  .services-grid{grid-template-columns:repeat(2,1fr);}
  .stats-inner{grid-template-columns:repeat(2,1fr);}
  .footer-grid{grid-template-columns:1fr 1fr;gap:40px;}
  .projects-grid{grid-template-columns:repeat(2,1fr);}
  .project-card.tall{grid-row:span 1;aspect-ratio:4/3;}
  .process-timeline{grid-template-columns:repeat(3,1fr);}
  .process-timeline::before{display:none;}
  .certs-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:768px){
  .navbar{padding:0 20px;}
  .nav-menu,.btn-teal.nav-quote-btn{display:none;}
  .hamburger{display:flex;}
  .hero-inner{flex-direction:column;padding:100px 20px 80px;}
  .hero-stats{flex-direction:row;flex-wrap:wrap;justify-content:center;}
  .hero-stat-card{min-width:140px;flex:1;}
  .section{padding:80px 20px;}
  .process-section{padding:80px 20px;}
  .stats-section{padding:80px 20px;}
  .certs-section{padding:80px 20px;}
  .cta-section{padding:0 20px 80px;}
  .footer{padding:60px 20px 28px;}
  .services-grid{grid-template-columns:1fr;}
  .why-inner{grid-template-columns:1fr;padding:0 20px;}
  .why-image-frame,.why-badge{display:none;}
  .projects-grid{grid-template-columns:1fr;}
  .stats-inner{grid-template-columns:1fr 1fr;}
  .certs-grid{grid-template-columns:1fr;}
  .footer-grid{grid-template-columns:1fr;gap:32px;}
  .process-timeline{grid-template-columns:1fr 1fr;}
  .cta-banner{padding:48px 24px;}
  .footer-bottom{flex-direction:column;text-align:center;}
}
@media(max-width:480px){
  .stats-inner{grid-template-columns:1fr;}
  .process-timeline{grid-template-columns:1fr;}
  .hero-ctas{flex-direction:column;}
  .hero-stats{flex-direction:column;}
  .hero-stat-card{min-width:unset;}
}

/* ── useReveal ── */
function useReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.1, rootMargin:'0px 0px -50px 0px' }
    );
    document.querySelectorAll('.reveal,.reveal-left,.reveal-right').forEach(t => obs.observe(t));
    return () => obs.disconnect();
  }, []);
}

/* ── useCounter ── */
function useCounter(target, duration=2000) {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const obs = new IntersectionObserver(([entry]) => {
      if(entry.isIntersecting) {
        const start = Date.now();
        const tick = () => {
          const p = Math.min((Date.now()-start)/duration, 1);
          setCount(Math.round(target * (1-Math.pow(1-p,3))));
          if(p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        obs.disconnect();
      }
    }, { threshold:0.5 });
    if(ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [target, duration]);
  return { count, ref };
}

/* ════════ APP ════════ */
const App = () => {
  const [dark, setDark] = useState(false);
  useReveal();

  const toggleDark = () => {
    setDark(d => {
      const next = !d;
      document.documentElement.setAttribute('data-theme', next ? 'dark' : 'light');
      return next;
    });
  };

  return (
    <>
      <Navbar dark={dark} toggleDark={toggleDark}/>
      <Hero/>
      <Services/>
      <WhyAspac/>
      <Projects/>
      <Portfolio/>
      <Process/>
      <Stats/>
      <Certificates/>
      <CTA/>
      <Footer/>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
